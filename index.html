/* ========== UTILITIES ========== */
function fmt(n){if(n==null)return'-';var abs=Math.abs(n);var s=abs>=1000000?'$'+(abs/1000000).toFixed(1)+'M':abs>=1000?'$'+Math.round(abs/1000).toLocaleString()+'K':'$'+Math.round(abs).toLocaleString();return n<0?'-'+s:s;}
function fmtFull(n){if(n==null)return'-';return(n<0?'-$':'$')+Math.abs(Math.round(n)).toLocaleString();}
function fmtDec(n){if(n==null)return'-';return(n<0?'-$':'$')+Math.abs(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');}
function pct(n){return n==null?'-':n.toFixed(1)+'%';}
function fmtPct(n){return n==null?'-':(n>=0?'+':'')+n.toFixed(1)+'%';}
function exGST(amount,gstPct){return gstPct>0?amount/(1+gstPct/100):amount;}

/* ========== COMPUTED METRICS (all ex-GST for budget comparison) ========== */
var MONTHLY_BUDGET_EX = GROUPS.reduce(function(s,g){return s+exGST(g.budgetMo,g.gstPct);},0);
var ANNUAL_BUDGET_EX = GROUPS.reduce(function(s,g){return s+exGST(g.budgetYr,g.gstPct);},0);

var ytdActual = GROUPS.reduce(function(s,g){return s+g.jan+g.feb;},0);
var ytdBudget = MONTHLY_BUDGET_EX * MONTHS_ELAPSED;
var ytdVariance = ytdActual - ytdBudget;
var ytdVariancePct = ytdVariance / ytdBudget * 100;
var annualProjected = (ytdActual / MONTHS_ELAPSED) * 12;
var budgetUtilization = ytdActual / ytdBudget * 100;

/* Per-group YTD (ex-GST budget vs ex-GST actual) */
var groupYTD = GROUPS.map(function(g){
  var actual = g.jan + g.feb;
  var budgetEx = exGST(g.budgetMo, g.gstPct);
  var budget = budgetEx * MONTHS_ELAPSED;
  var variance = actual - budget;
  var varPct = budget > 0 ? (variance / budget * 100) : 0;
  return {key:g.key,name:g.name,color:g.color,actual:actual,budget:budget,variance:variance,varPct:varPct,
          budgetMo:budgetEx,jan:g.jan,feb:g.feb,gstPct:g.gstPct,note:g.note};
});

/* Monthly chart data — budget converted to ex-GST with annual spikes */
var annualSpikes = {Mar:exGST(805,10), May:4000, Jul:18463};
var monthlyChartData = MONTHS.map(function(m){
  var budget = MONTHLY_BUDGET_EX + (annualSpikes[m] || 0);
  var actual = null;
  if(m==='Jan') actual = GROUPS.reduce(function(s,g){return s+g.jan;},0);
  if(m==='Feb') actual = GROUPS.reduce(function(s,g){return s+g.feb;},0);
  return {month:m, budget:Math.round(budget), actual:actual};
});

/* Group chart data for horizontal bar (budget vs actual) */
var groupChartData = groupYTD.map(function(g){
  return {name:g.name.length>14?g.name.substring(0,12)+'..':g.name,fullName:g.name,actual:g.actual,budget:g.budget,color:g.color};
});

/* Biggest variance items for alerts */
var varianceRanked = groupYTD.slice().sort(function(a,b){return Math.abs(b.variance)-Math.abs(a.variance);});

  kpiValue:{fontSize:28,fontWeight:800,color:'#F8FAFC',fontFeatureSettings:'"tnum"',letterSpacing:'-0.02em'},

/* ========== SHARED COMPONENTS ========== */
function KpiCard(props){
  var glowColor = props.alert==='red'?'rgba(239,68,68,0.15)':props.alert==='amber'?'rgba(245,158,11,0.15)':'transparent';
  var borderColor = props.alert==='red'?'#EF4444':props.alert==='amber'?'#F59E0B':'#334155';
  var trendColor = props.trendUp===true?'#10B981':props.trendUp===false?'#EF4444':'#94A3B8';
  return h('div',{style:Object.assign({},S.kpi,{boxShadow:'0 0 20px '+glowColor,borderColor:borderColor})},
    h('div',{style:S.kpiLabel},props.label),
    h('div',{style:Object.assign({},S.kpiValue,props.valueColor?{color:props.valueColor}:{})},props.value),
    props.sub?h('div',{style:S.kpiSub},props.sub):null,
    props.trend?h('div',{style:Object.assign({},S.kpiTrend,{color:trendColor})},props.trend):null
  );
}

function StatusBadge(props){
  var colors = {pending:'#F59E0B',unpaid:'#EF4444',action:'#3B82F6',investigating:'#8B5CF6',upcoming:'#06B6D4',complete:'#10B981',critical:'#EF4444'};
  var c = colors[props.status]||'#94A3B8';
  return h('span',{style:Object.assign({},S.tag,{background:c+'22',color:c,border:'1px solid '+c})},props.status.toUpperCase());
}

/* ========== TAB 1: BUDGET OVERVIEW ========== */
function BudgetTab(){
  var overBudget = ytdVariance > 0;
  var statusColor = overBudget ? '#EF4444' : '#10B981';
  var statusLabel = overBudget ? 'OVER BUDGET' : 'UNDER BUDGET';

  return h('div',null,
    /* KPI Row */
    h('div',{style:S.kpiRow},
      h(KpiCard,{label:'Monthly Budget (ex-GST)',value:fmtDec(MONTHLY_BUDGET_EX),sub:'Excluding GST per month'}),
      h(KpiCard,{label:'YTD Actual (ex-GST)',value:fmtFull(ytdActual),sub:MONTHS_ELAPSED+' months (Jan-Feb)',trend:fmtPct(ytdVariancePct)+' vs budget',trendUp:!overBudget}),
      h(KpiCard,{label:'YTD Variance',value:fmtFull(Math.abs(ytdVariance)),valueColor:statusColor,sub:statusLabel,alert:overBudget?'red':null}),
      h(KpiCard,{label:'Annual Budget (ex-GST)',value:fmtFull(ANNUAL_BUDGET_EX),sub:'Projected: '+fmtFull(annualProjected),trend:annualProjected<=ANNUAL_BUDGET_EX?'Under projected':'Over projected',trendUp:annualProjected<=ANNUAL_BUDGET_EX}),
      h(KpiCard,{label:'Budget Utilization',value:pct(budgetUtilization),sub:'Target: 100%',alert:budgetUtilization>120?'red':budgetUtilization>110?'amber':null})
    ),

    /* Charts Row */
    h('div',{style:S.grid2},
      /* Monthly Budget vs Actual */
      h('div',{style:S.section},
        h('div',{style:S.sectionTitle},'Monthly Budget vs Actual (ex-GST)'),
        h('div',{style:S.chartWrap},
          h(ResponsiveContainer,{width:'100%',height:'100%'},
            h(ComposedChart,{data:monthlyChartData,margin:{top:20,right:20,bottom:5,left:10}},
              h(CartesianGrid,{strokeDasharray:'3 3',stroke:'#334155'}),
              h(XAxis,{dataKey:'month',stroke:'#64748B',fontSize:12}),
              h(YAxis,{stroke:'#64748B',fontSize:11,tickFormatter:function(v){return '$'+Math.round(v/1000)+'K';}}),
              h(Tooltip,{formatter:function(v){return v!=null?fmtFull(v):'-';},contentStyle:{background:'#1E293B',border:'1px solid #475569',borderRadius:8,color:'#E2E8F0'}}),
              h(Legend,null),
              h(Bar,{dataKey:'budget',fill:'#334155',radius:[4,4,0,0],name:'Budget (ex-GST)'}),
              h(Bar,{dataKey:'actual',fill:'#3B82F6',radius:[4,4,0,0],name:'Actual (ex-GST)'}),
              h(ReferenceLine,{y:Math.round(MONTHLY_BUDGET_EX),stroke:'#F59E0B',strokeDasharray:'5 5',label:{value:'Base $'+Math.round(MONTHLY_BUDGET_EX/1000)+'K',fill:'#F59E0B',fontSize:11,position:'right'}})
            )
          )
        )
      ),

      /* Group Budget vs Actual — horizontal bar chart */
      h('div',{style:S.section},
        h('div',{style:S.sectionTitle},'Budget vs Actual by Group (YTD ex-GST)'),
        h('div',{style:{width:'100%',height:320}},
          h(ResponsiveContainer,{width:'100%',height:'100%'},
            h(BarChart,{data:groupChartData,margin:{top:10,right:30,bottom:5,left:10},layout:'vertical'},
              h(CartesianGrid,{strokeDasharray:'3 3',stroke:'#334155'}),
              h(XAxis,{type:'number',stroke:'#64748B',fontSize:11,tickFormatter:function(v){return '$'+Math.round(v/1000)+'K';}}),
              h(YAxis,{type:'category',dataKey:'name',stroke:'#64748B',fontSize:11,width:110}),
              h(Tooltip,{formatter:function(v){return fmtFull(v);},contentStyle:{background:'#1E293B',border:'1px solid #475569',borderRadius:8,color:'#E2E8F0'}}),
              h(Legend,null),
              h(Bar,{dataKey:'budget',fill:'#475569',name:'Budget (ex-GST)',radius:[0,4,4,0]}),
              h(Bar,{dataKey:'actual',fill:'#3B82F6',name:'Actual (ex-GST)',radius:[0,4,4,0]})
            )
          )
        )
      )
    ),

    /* Variance Alerts */
    h('div',{style:S.section},
      h('div',{style:S.sectionTitle},'Variance Alerts'),
      h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(280px,1fr))',gap:12}},
        varianceRanked.filter(function(g){return Math.abs(g.varPct)>10;}).map(function(g,i){
          var over = g.variance > 0;
          var bgColor = over ? 'rgba(239,68,68,0.08)' : 'rgba(16,185,129,0.08)';
          var borderColor = over ? '#EF4444' : '#10B981';
          return h('div',{key:i,style:Object.assign({},S.miniCard,{background:bgColor,borderColor:borderColor})},
            h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}},
              h('span',{style:{fontWeight:600,color:'#F8FAFC'}},g.name),
              h('span',{style:Object.assign({},S.tag,{background:borderColor+'22',color:borderColor})},over?'OVER':'UNDER')
            ),
            h('div',{style:{fontSize:24,fontWeight:800,color:borderColor}},(over?'+':'')+fmtFull(g.variance)),
            h('div',{style:{fontSize:12,color:'#94A3B8',marginTop:4}},fmtPct(g.varPct)+' | Budget: '+fmtFull(g.budget)+' | Actual: '+fmtFull(g.actual)),
            g.note?h('div',{style:{fontSize:11,color:'#64748B',marginTop:6,fontStyle:'italic'}},g.note):null
          );
        })
      )
    ),

    /* Action Items (simplified — no owner column) */
    h('div',{style:S.section},
      h('div',{style:S.sectionTitle},'Action Items'),
      h('div',{style:{overflowX:'auto'}},
        h('table',{style:S.table},
          h('thead',null,
            h('tr',null,
              h('th',{style:Object.assign({},S.th,{width:30})},'#'),
              h('th',{style:S.th},'Task'),
              h('th',{style:S.thR},'Amount'),
              h('th',{style:S.th},'Status'),
              h('th',{style:S.th},'Priority')
            )
          ),
          h('tbody',null,
            TASKS.map(function(t,i){
              var prColors = {critical:'#EF4444',high:'#F59E0B',medium:'#3B82F6',low:'#94A3B8'};
              var pc = prColors[t.priority]||'#94A3B8';
              return h('tr',{key:i,style:t.priority==='critical'?{background:'rgba(239,68,68,0.05)'}:{}},
                h('td',{style:S.td},t.id),
                h('td',{style:Object.assign({},S.td,{maxWidth:400})},t.task),
                h('td',{style:S.tdR},t.amount>0?fmtDec(t.amount):'-'),
                h('td',{style:S.td},h(StatusBadge,{status:t.status})),

                )
              );
            })
          )
        )
      )
    )
  );

/* ========== TAB 2: CURRENT MONTH ========== */
function CurrentMonthTab(){
  var currentMonth = MONTHS[CURRENT_MONTH_IDX];
  var today = new Date();
  var daysInMonth = 31; /* March */
  var dayElapsed = Math.min(today.getDate(), 6); /* Data as of Mar 6 */
  var monthBudget = MONTHLY_BUDGETS_INC[currentMonth] || 24132;

  /* Suppliers due this month with debit day */
  var monthSuppliers = SUPPLIERS.filter(function(s){return s[4]==='Monthly'||s[7]===currentMonth;}).map(function(s){
    var day = s[8];
    var status = day > 0 && day <= dayElapsed ? 'processed' : day > 0 ? 'upcoming' : 'variable';
    return {group:s[0],supplier:s[1],item:s[2],account:s[3],amount:s[6],gst:s[7],day:day,method:s[5],status:status};
  }).sort(function(a,b){return (a.day||99)-(b.day||99);});

  /* Add SIA annual for March */
  var marchItems = monthSuppliers.slice();
  marchItems.push({group:'it',supplier:'Sign In App',item:'Visitor Sign-In (SIA) — ANNUAL',account:'5-4220',amount:805,gst:true,day:0,method:'Auto DD',status:'upcoming'});

  var totalDue = marchItems.reduce(function(s,item){return s+item.amount;},0) + 805;

  return h('div',null,
    /* KPI Row */
    h('div',{style:S.kpiRow},
      h(KpiCard,{label:'Current Month',value:currentMonth+' 2026',sub:'Day '+dayElapsed+' of '+daysInMonth}),
      h(KpiCard,{label:'Month Budget (inc GST)',value:fmtFull(monthBudget),sub:monthBudget>24132?'Includes annual items':'Base monthly budget'}),
      h(KpiCard,{label:'Expected Payments',value:marchItems.length+' items',sub:fmtFull(totalDue)+' total due'}),
      h(KpiCard,{label:'Special Items',value:'SIA Annual',sub:'$805 inc GST — Visitor Sign-In',alert:'amber'})
    ),

    /* Payment Schedule */
    h('div',{style:S.section},
      h('div',{style:S.sectionTitle},currentMonth+' 2026 Payment Schedule'),
      h('div',{style:{overflowX:'auto'}},
        h('table',{style:S.table},
          h('thead',null,
            h('tr',null,
              h('th',{style:S.th},'Day'),
              h('th',{style:S.th},'Supplier'),
              h('th',{style:S.th},'Item'),
              h('th',{style:S.th},'Account'),
              h('th',{style:S.thR},'Amount'),
              h('th',{style:S.th},'Method'),
              h('th',{style:S.th},'Status')
            )
          ),
          h('tbody',null,
            marchItems.map(function(item,i){
              var statusColors = {processed:'#10B981',upcoming:'#F59E0B',variable:'#94A3B8'};
              return h('tr',{key:i},
                h('td',{style:S.td},item.day>0?'~'+item.day:'Varies'),
                h('td',{style:Object.assign({},S.td,{fontWeight:500})},item.supplier),
                h('td',{style:S.td},item.item),
                h('td',{style:Object.assign({},S.td,{fontFamily:'monospace',fontSize:12})},item.account),
                h('td',{style:S.tdR},fmtDec(item.amount)),
                h('td',{style:S.td},item.method),
                h('td',{style:S.td},
                  h('span',{style:Object.assign({},S.tag,{background:(statusColors[item.status]||'#94A3B8')+'22',color:statusColors[item.status]||'#94A3B8'})},item.status.toUpperCase())
                )
              );
            })
          )
        )
      )
    ),

    /* Annual Items Calendar */
    h('div',{style:S.section},
      h('div',{style:S.sectionTitle},'Annual Payment Calendar'),
      h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:12}},
        ANNUAL_ITEMS.map(function(item,i){
          var isThisMonth = item.month === currentMonth;
          var isPast = MONTHS.indexOf(item.month) < CURRENT_MONTH_IDX;
          var bgColor = isThisMonth ? 'rgba(59,130,246,0.15)' : isPast ? 'rgba(16,185,129,0.08)' : 'rgba(71,85,105,0.15)';
          var borderColor = isThisMonth ? '#3B82F6' : isPast ? '#10B981' : '#475569';
          return h('div',{key:i,style:Object.assign({},S.miniCard,{background:bgColor,borderColor:borderColor})},
            h('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:6}},
              h('span',{style:Object.assign({},S.tag,{background:borderColor+'22',color:borderColor})},item.month),
              h('span',{style:{fontSize:18,fontWeight:700,color:'#F8FAFC'}},fmtFull(item.amount))
            ),
            h('div',{style:{fontSize:13,fontWeight:500,color:'#E2E8F0'}},item.item),
            h('div',{style:{fontSize:11,color:'#94A3B8',marginTop:4}},item.group)
          );
        })
      )
    ),

    /* Group Breakdown for Current Month */
    h('div',{style:S.section},
      h('div',{style:S.sectionTitle},'Supplier Detail by Group'),
      GROUPS.map(function(group){
        var groupSuppliers = SUPPLIERS.filter(function(s){return s[0]===group.key;});
        return h('div',{key:group.key,style:{marginBottom:16}},
          h('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:8}},
            h('span',{style:{display:'inline-block',width:12,height:12,borderRadius:'50%',background:group.color}}),
            h('span',{style:{fontWeight:700,color:'#F8FAFC',fontSize:14}},group.name),
            h('span',{style:{color:'#94A3B8',fontSize:12,marginLeft:8}},fmtDec(group.budgetMo)+'/mo (inc GST)')
          ),
          h('div',{style:{paddingLeft:20}},
            groupSuppliers.map(function(s,j){
              return h('div',{key:j,style:{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid #1E293B',fontSize:13}},
                h('div',{style:{color:'#E2E8F0'}},
                  h('span',{style:{fontWeight:500}},s[1]),
                  h('span',{style:{color:'#64748B',marginLeft:8}},s[2])
                ),
                h('div',{style:{display:'flex',gap:16,alignItems:'center'}},
                  h('span',{style:{color:'#F8FAFC',fontWeight:500,fontFeatureSettings:'"tnum"'}},s[6]>0?fmtDec(s[6]):s[4]==='Annual'?'Annual':'$0'),
                  h('span',{style:{color:'#64748B',fontSize:11,minWidth:60}},s[5])
                )
              );
            })
          )
        );
      })
    )
  );
}

/* ========== MAIN APP ========== */
var TABS = ['Budget Overview','Current Month'];

function App(){
  var state = useState(0);
  var activeTab = state[0];
  var setTab = state[1];

  var overBudget = ytdVariance > 0;
  var statusColor = overBudget ? '#EF4444' : '#10B981';
  var statusLabel = overBudget ? 'OVER BUDGET' : 'ON TRACK';
  var openTasks = TASKS.length;

  var tabContent;
  switch(activeTab){
    case 0: tabContent = h(BudgetTab); break;
    case 1: tabContent = h(CurrentMonthTab); break;
    default: tabContent = h(BudgetTab);
  }

  return h('div',{style:{minHeight:'100vh',background:'#0B1120'}},
    /* Header */
    h('div',{style:S.header},
      h('div',{style:{display:'flex',alignItems:'center',gap:16}},
        h('div',{style:{width:10,height:10,borderRadius:'50%',background:overBudget?'#EF4444':'#10B981',boxShadow:'0 0 8px '+(overBudget?'#EF4444':'#10B981')}}),
        h('div',{style:S.headerTitle},'Shafston OPEX 2026 Dashboard')
      ),
      h('div',{style:{display:'flex',alignItems:'center',gap:12}},
        h('div',{style:Object.assign({},S.badge,{background:statusColor+'22',color:statusColor,border:'1px solid '+statusColor})},statusLabel),
        openTasks > 0 ? h('div',{style:Object.assign({},S.badge,{background:'#F59E0B22',color:'#F59E0B',border:'1px solid #F59E0B'})},openTasks+' TASKS') : null,
        h('div',{style:{fontSize:12,color:'#64748B'}},'Data: '+DATA_DATE)
      )
    ),

    /* Navigation */
    h('div',{style:S.nav},
      TABS.map(function(tab,i){
        return h('button',{key:i,style:activeTab===i?S.navBtnActive:S.navBtn,onClick:function(){setTab(i);}},tab);
      })
    ),

    /* Content */
    h('div',{style:S.content},tabContent),

    /* Footer */
    h('div',{style:S.footer},'Shafston International College | OPEX Dashboard 2026 | Budget: $'+MONTHLY_BUDGET_EX.toFixed(2)+'/mo (ex-GST) | Source: Xero + OPEX Schedule | Updated '+DATA_DATE)
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
