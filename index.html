function fmt(n){if(n==null)return'-';var abs=Math.abs(n);var s=abs>=1000000?'$'+(abs/1000000).toFixed(1)+'M':abs>=1000?'$'+Math.round(abs/1000).toLocaleString()+'K':'$'+Math.round(abs).toLocaleString();return n<0?'-'+s:s;}
function fmtFull(n){if(n==null)return'-';return(n<0?'-$':'$')+Math.abs(Math.round(n)).toLocaleString();}
function fmtDec(n){if(n==null)return'-';return(n<0?'-$':'$')+Math.abs(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');}
function pct(n){return n==null?'-':n.toFixed(1)+'%';}
function fmtPct(n){return n==null?'-':(n>=0?'+':'')+n.toFixed(1)+'%';}

var ytdVariancePct = ytdVariance / ytdBudget * 100;
var annualProjected = (ytdActual / MONTHS_ELAPSED) * 12;
var budgetUtilization = ytdActual / ytdBudget * 100;

/* Per-group YTD */
var groupYTD = GROUPS.map(function(g){
  var actual = g.jan + g.feb;
  var budget = g.budgetMo * MONTHS_ELAPSED;
  var variance = actual - budget;
  var varPct = budget > 0 ? (variance / budget * 100) : 0;
  return {key:g.key,name:g.name,color:g.color,actual:actual,budget:budget,variance:variance,varPct:varPct,
          budgetMo:g.budgetMo,jan:g.jan,feb:g.feb,gstPct:g.gstPct,note:g.note};
});

/* Chart data: monthly actual vs budget for each month */
var monthlyChartData = MONTHS.map(function(m){
  var budget = MONTHLY_BUDGETS[m] || MONTHLY_BUDGET;
  var actual = null;
  if(m==='Jan') actual = GROUPS.reduce(function(s,g){return s+g.jan;},0);
  if(m==='Feb') actual = GROUPS.reduce(function(s,g){return s+g.feb;},0);
  return {month:m, budget:budget, actual:actual};
});

/* ========== SHARED COMPONENTS ========== */
function KpiCard(props){
  var glowColor = props.alert==='red'?'rgba(239,68,68,0.15)':props.alert==='amber'?'rgba(245,158,11,0.15)':'transparent';
  var borderColor = props.alert==='red'?'#EF4444':props.alert==='amber'?'#F59E0B':'#334155';
  var trendColor = props.trendUp===true?'#10B981':props.trendUp===false?'#EF4444':'#94A3B8';
  return h('div',{style:Object.assign({},S.kpi,{boxShadow:'0 0 20px '+glowColor,borderColor:borderColor})},
    h('div',{style:S.kpiLabel},props.label),
    h('div',{style:Object.assign({},S.kpiValue,props.valueColor?{color:props.valueColor}:{})},props.value),
    props.sub?h('div',{style:S.kpiSub},props.sub):null,
    props.trend?h('div',{style:Object.assign({},S.kpiTrend,{color:trendColor})},props.trend):null
  );
}

function StatusBadge(props){
  var colors = {pending:'#F59E0B',unpaid:'#EF4444',action:'#3B82F6',investigating:'#8B5CF6',upcoming:'#06B6D4',complete:'#10B981',critical:'#EF4444'};
  var c = colors[props.status]||'#94A3B8';
  return h('span',{style:Object.assign({},S.tag,{background:c+'22',color:c,border:'1px solid '+c})},props.status.toUpperCase());
}

function SeverityDot(props){
  var colors = {red:'#EF4444',amber:'#F59E0B',green:'#10B981'};
  var c = colors[props.severity]||'#94A3B8';
  return h('span',{style:{display:'inline-block',width:10,height:10,borderRadius:'50%',background:c,boxShadow:'0 0 6px '+c,marginRight:8}});
}

      h(KpiCard,{label:'Monthly Budget',value:fmtDec(MONTHLY_BUDGET),sub:'Inc GST per month'}),

    h('div',{style:S.grid2},
      /* Monthly Budget vs Actual */
      h('div',{style:S.section},
        h('div',{style:S.sectionTitle},'Monthly Budget vs Actual'),
        h('div',{style:S.chartWrap},

/* ========== TAB 4: CASH VS ACCRUED ========== */
function CashAccruedTab(){
  /* Calculate GST impact per group */
  var gstAnalysis = GROUPS.map(function(g){
    var budgetExGST = g.gstPct > 0 ? g.budgetMo / (1 + g.gstPct/100) : g.budgetMo;
    var gstAmount = g.budgetMo - budgetExGST;
    var ytdActual = g.jan + g.feb;
    var ytdBudgetExGST = budgetExGST * MONTHS_ELAPSED;
    var ytdBudgetIncGST = g.budgetMo * MONTHS_ELAPSED;
    var cashVsActual = ytdBudgetIncGST - ytdActual;
    return {
      name:g.name, color:g.color, key:g.key,
      budgetIncGST:g.budgetMo, budgetExGST:budgetExGST, gstPerMonth:gstAmount,
      gstPct:g.gstPct, gstFree:g.gstPct===0,
      ytdActual:ytdActual, ytdBudgetInc:ytdBudgetIncGST, ytdBudgetEx:ytdBudgetExGST,
      gap:cashVsActual, note:g.note
    };
  });

  var totalBudgetInc = gstAnalysis.reduce(function(s,g){return s+g.budgetIncGST;},0);
  var totalBudgetEx = gstAnalysis.reduce(function(s,g){return s+g.budgetExGST;},0);
  var totalGST = totalBudgetInc - totalBudgetEx;
  var totalYTDActual = gstAnalysis.reduce(function(s,g){return s+g.ytdActual;},0);
  var totalYTDBudgetInc = gstAnalysis.reduce(function(s,g){return s+g.ytdBudgetInc;},0);

  /* Accrual gaps */
  var accrualItems = [
    {item:'NEAS Membership',budgeted:935*2,recorded:0,gap:935*2,type:'Budgeted, not in P&L',reason:'Payment not recorded in Xero Jan-Feb'},

    {item:'Daily Operations',budgeted:1753*2,recorded:4908,gap:4908-3506,type:'Over-recorded',reason:'Filing fees and cleaning higher than monthly average'}
  ];

  /* Chart: Budget inc GST vs P&L ex-GST comparison */
  var comparisonData = gstAnalysis.map(function(g){
    return {name:g.name.length>12?g.name.substring(0,12)+'..':g.name,budgetInc:g.ytdBudgetInc,actualEx:g.ytdActual};
  });

  return h('div',null,
    /* Explanation Panel */
    h('div',{style:Object.assign({},S.section,{background:'linear-gradient(135deg,#1E293B,#0F172A)',borderColor:'#3B82F6'})},
      h('div',{style:{fontSize:16,fontWeight:700,color:'#60A5FA',marginBottom:12}},'Understanding the GST & Accrual Gap'),
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:24}},

          h('div',{style:{fontSize:13,color:'#E2E8F0',lineHeight:1.6}},
            h('strong',{style:{color:'#F59E0B'}},'Budget (inc GST)'),
            ' = What we actually pay out of bank account. This is our OPEX schedule amount.'
          ),
          h('div',{style:{fontSize:13,color:'#E2E8F0',lineHeight:1.6,marginTop:8}},

      h(KpiCard,{label:'Monthly Budget (ex GST)',value:fmtDec(totalBudgetEx),sub:'P&L equivalent'}),
      h(KpiCard,{label:'GST Component',value:fmtDec(totalGST)+'/mo',sub:pct(totalGST/totalBudgetInc*100)+' of total budget',trend:'Recoverable via BAS'}),

              h('div',null,
                h('div',{style:{fontSize:10,color:'#94A3B8'}},'P&L ACTUAL'),
                h('div',{style:{fontSize:16,fontWeight:700,color:'#3B82F6'}},fmtFull(item.recorded))
              ),
              h('div',null,
                h('div',{style:{fontSize:10,color:'#94A3B8'}},'GAP'),
                h('div',{style:{fontSize:16,fontWeight:700,color:color}},fmtFull(item.gap))
              )
            ),
            h('div',{style:{fontSize:12,color:'#94A3B8',fontStyle:'italic'}},item.reason)
          );
        })
      )
    )
  );
}

/* ========== MAIN APP ========== */
var TABS = ['Budget Overview','Current Month','Tasks & Actions','Cash vs Accrued'];

function App(){
  var state = useState(0);
  var activeTab = state[0];
  var setTab = state[1];

  var overBudget = ytdVariance > 0;
  var statusColor = overBudget ? '#EF4444' : '#10B981';
  var statusLabel = overBudget ? 'OVER BUDGET' : 'ON TRACK';
  var openTasks = TASKS.length;

  var tabContent;
  switch(activeTab){
    case 0: tabContent = h(BudgetTab); break;
    case 1: tabContent = h(CurrentMonthTab); break;
    case 2: tabContent = h(TasksTab); break;
    case 3: tabContent = h(CashAccruedTab); break;
    default: tabContent = h(BudgetTab);
  }

  return h('div',{style:{minHeight:'100vh',background:'#0B1120'}},
    /* Header */
    h('div',{style:S.header},
      h('div',{style:{display:'flex',alignItems:'center',gap:16}},
        h('div',{style:{width:10,height:10,borderRadius:'50%',background:overBudget?'#EF4444':'#10B981',boxShadow:'0 0 8px '+(overBudget?'#EF4444':'#10B981')}}),
        h('div',{style:S.headerTitle},'Shafston OPEX 2026 Dashboard')
      ),
      h('div',{style:{display:'flex',alignItems:'center',gap:12}},
        h('div',{style:Object.assign({},S.badge,{background:statusColor+'22',color:statusColor,border:'1px solid '+statusColor})},statusLabel),
        openTasks > 0 ? h('div',{style:Object.assign({},S.badge,{background:'#F59E0B22',color:'#F59E0B',border:'1px solid #F59E0B'})},openTasks+' TASKS') : null,
        h('div',{style:{fontSize:12,color:'#64748B'}},'Data: '+DATA_DATE)
      )
    ),

    /* Navigation */
    h('div',{style:S.nav},
      TABS.map(function(tab,i){
        return h('button',{key:i,style:activeTab===i?S.navBtnActive:S.navBtn,onClick:function(){setTab(i);}},tab);
      })
    ),

    /* Content */
    h('div',{style:S.content},tabContent),

    /* Footer */
    h('div',{style:S.footer},'Shafston International College | OPEX Dashboard 2026 | Budget: $'+MONTHLY_BUDGET.toLocaleString()+'/mo | Source: Xero + OPEX Schedule | Updated '+DATA_DATE)
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
