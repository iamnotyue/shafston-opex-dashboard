/* ========== UTILITIES ========== */
function fmt(n){if(n==null)return'-';var abs=Math.abs(n);var s=abs>=1000000?'$'+(abs/1000000).toFixed(1)+'M':abs>=1000?'$'+Math.round(abs/1000).toLocaleString()+'K':'$'+Math.round(abs).toLocaleString();return n<0?'-'+s:s;}
function fmtFull(n){if(n==null)return'-';return(n<0?'-$':'$')+Math.abs(Math.round(n)).toLocaleString();}
function fmtDec(n){if(n==null)return'-';return(n<0?'-$':'$')+Math.abs(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');}
function pct(n){return n==null?'-':n.toFixed(1)+'%';}
function fmtPct(n){return n==null?'-':(n>=0?'+':'')+n.toFixed(1)+'%';}
function exGST(amount,gstPct){return gstPct>0?amount/(1+gstPct/100):amount;}

/* ========== COMPUTED METRICS (all ex-GST for budget comparison) ========== */
var MONTHLY_BUDGET_EX = GROUPS.reduce(function(s,g){return s+exGST(g.budgetMo,g.gstPct);},0);
var ANNUAL_BUDGET_EX = GROUPS.reduce(function(s,g){return s+exGST(g.budgetYr,g.gstPct);},0);

var ytdActual = GROUPS.reduce(function(s,g){var t=0;for(var i=0;i<MONTHS_ELAPSED;i++)t+=(g[MONTHS[i].toLowerCase()]||0);return s+t;},0);
var ytdBudget = MONTHLY_BUDGET_EX * MONTHS_ELAPSED;
var ytdVariance = ytdActual - ytdBudget;
var ytdVariancePct = ytdVariance / ytdBudget * 100;
var annualProjected = (ytdActual / MONTHS_ELAPSED) * 12;
var budgetUtilization = ytdActual / ytdBudget * 100;

/* Per-group YTD (ex-GST budget vs ex-GST actual) */
var groupYTD = GROUPS.map(function(g){
  var actual=0;for(var i=0;i<MONTHS_ELAPSED;i++)actual+=(g[MONTHS[i].toLowerCase()]||0);
  var budgetEx = exGST(g.budgetMo, g.gstPct);
  var budget = budgetEx * MONTHS_ELAPSED;
  var variance = actual - budget;
  var varPct = budget > 0 ? (variance / budget * 100) : 0;
  return {key:g.key,name:g.name,color:g.color,actual:actual,budget:budget,variance:variance,varPct:varPct,
          budgetMo:budgetEx,gstPct:g.gstPct,note:g.note};
});

/* Monthly chart data — budget converted to ex-GST with annual spikes */
var annualSpikes = {Mar:exGST(805,10), May:4000, Jul:18463};
var monthlyChartData = MONTHS.map(function(m,idx){
  var budget = MONTHLY_BUDGET_EX + (annualSpikes[m] || 0);
  var actual = null;
  if(idx < MONTHS_ELAPSED) actual = GROUPS.reduce(function(s,g){return s+(g[m.toLowerCase()]||0);},0);
  return {month:m, budget:Math.round(budget), actual:actual};
});

/* Group chart data for horizontal bar (budget vs actual) */
var groupChartData = groupYTD.map(function(g){
  return {name:g.name.length>14?g.name.substring(0,12)+'..':g.name,fullName:g.name,actual:g.actual,budget:g.budget,color:g.color};

/* ========== TAB 3: SALES & MARKETING ========== */
function SalesMarketingTab(){
  var ps = useState('YTD'); var selectedPeriod = ps[0]; var setPeriod = ps[1];
  var fs = useState('All'); var filterCat = fs[0]; var setFilterCat = fs[1];
  var activeMonths = MONTHS.slice(0,CURRENT_MONTH_IDX+1);
  var isYTD = selectedPeriod === 'YTD';
  var smBudgetMo = SM_BUDGET_YR / 12;
  var catNameMap = {};SM_CATEGORIES.forEach(function(c){catNameMap[c.key]=c.name;});

  /* Compute filtered metrics */
  var filtered = useMemo(function(){
    if(isYTD){
      var actual = SM_CATEGORIES.reduce(function(s,c){return s+catSum(c);},0);
      var budget = smBudgetMo * MONTHS_ELAPSED;
      return {actual:actual,budget:budget,label:MONTHS_ELAPSED+' months ('+MONTHS.slice(0,MONTHS_ELAPSED).join('-')+')'};
    } else {
      var mIdx = MONTHS.indexOf(selectedPeriod);
      var hasData = mIdx <= CURRENT_MONTH_IDX;
      var actual2 = hasData ? SM_CATEGORIES.reduce(function(s,c){return s+catMonth(c,selectedPeriod);},0) : 0;
      return {actual:actual2,budget:smBudgetMo,label:selectedPeriod+' 2026'+(hasData?'':' (no data)'),hasData:hasData};
    }
  },[selectedPeriod]);

  var fVariance = filtered.actual - filtered.budget;
  var fVariancePct = filtered.budget>0?(fVariance/filtered.budget*100):0;
  var overBudget = fVariance > 0;
  var statusColor = overBudget ? '#EF4444' : '#10B981';
  var statusLabel = overBudget ? 'OVER BUDGET' : 'UNDER BUDGET';
  var fUtilization = filtered.budget>0?(filtered.actual/filtered.budget*100):0;

  /* Filtered transactions */
  var periodTxns = isYTD ? SM_TXNS : SM_TXNS.filter(function(t){var mi=txnMonthIdx(t);return mi===MONTHS.indexOf(selectedPeriod);});
  var filteredTxns = filterCat==='All' ? periodTxns : periodTxns.filter(function(t){return t.cat===filterCat;});

  /* Chart data — stacked bar by category per month */
  var chartMonths = isYTD ? activeMonths : [selectedPeriod];
  var stackData = chartMonths.map(function(m){
    var obj = {month:m,budget:Math.round(smBudgetMo)};
    SM_CATEGORIES.forEach(function(c){obj[c.name] = catMonth(c,m);});
    return obj;
  });

  /* Category horizontal bar data */
  var catBarData = SM_CATEGORIES.map(function(c){
    var val = isYTD ? catSum(c) : catMonth(c,selectedPeriod);
    return {name:c.name,amount:val,color:c.color};
  });

  /* Month totals for table */
  var tableMonths = isYTD ? activeMonths : [selectedPeriod];
  var monthTotals = tableMonths.map(function(m){return SM_CATEGORIES.reduce(function(s,c){return s+catMonth(c,m);},0);});

  return h('div',null,
    /* Filter Bar */
    h('div',{style:{background:'#1E293B',borderRadius:12,padding:'16px 20px',border:'1px solid #334155',marginBottom:20}},
      h('div',{style:S.filterBar},
        h('span',{style:S.filterLabel},'Period:'),
        h('button',{style:selectedPeriod==='YTD'?S.chipActive:S.chip,onClick:function(){setPeriod('YTD');}},'YTD'),
        MONTHS.map(function(m){
          var hasData = MONTHS.indexOf(m) <= CURRENT_MONTH_IDX;
          return h('button',{key:m,style:Object.assign({},selectedPeriod===m?S.chipActive:S.chip,!hasData?{opacity:0.5}:{}),onClick:function(){setPeriod(m);}},m);
        })
      )
    ),

    /* 4 KPI Cards */
    h('div',{style:S.kpiRow},
      h(KpiCard,{label:'Total Budget (Annual)',value:fmtFull(SM_BUDGET_YR),sub:'$'+Math.round(smBudgetMo).toLocaleString()+'/mo'}),
      h(KpiCard,{label:isYTD?'YTD Budget':selectedPeriod+' Budget',value:fmtFull(Math.round(filtered.budget)),sub:isYTD?MONTHS_ELAPSED+' months':'Monthly budget'}),
      h(KpiCard,{label:isYTD?'YTD Actual':selectedPeriod+' Actual',value:fmtFull(filtered.actual),sub:filtered.label,trend:fmtPct(fVariancePct)+' vs budget',trendUp:!overBudget}),
      h(KpiCard,{label:'Variance',value:(fVariance>=0?'+':'')+fmtFull(fVariance),valueColor:statusColor,sub:statusLabel+' | '+pct(fUtilization)+' utilization',alert:overBudget?'red':null})
    ),

    /* Charts Row */
    h('div',{style:S.grid2},
      /* Stacked bar — category breakdown per month */
      h('div',{style:S.section},
        h('div',{style:S.sectionTitle},'Monthly Spend by Category'+(isYTD?'':' — '+selectedPeriod)),
        h('div',{style:S.chartWrap},
          h(ResponsiveContainer,{width:'100%',height:'100%'},
            h(ComposedChart,{data:stackData,margin:{top:20,right:20,bottom:5,left:10}},
              h(CartesianGrid,{strokeDasharray:'3 3',stroke:'#334155'}),
              h(XAxis,{dataKey:'month',stroke:'#64748B',fontSize:12}),
              h(YAxis,{stroke:'#64748B',fontSize:11,tickFormatter:function(v){return '$'+Math.round(v/1000)+'K';}}),
              h(Tooltip,{formatter:function(v){return fmtFull(v);},contentStyle:{background:'#1E293B',border:'1px solid #475569',borderRadius:8,color:'#E2E8F0'}}),
              h(Legend,null),
              SM_CATEGORIES.map(function(c){return h(Bar,{key:c.key,dataKey:c.name,stackId:'a',fill:c.color});}),
              h(ReferenceLine,{y:Math.round(smBudgetMo),stroke:'#F59E0B',strokeDasharray:'5 5',label:{value:'Budget $'+Math.round(smBudgetMo/1000)+'K/mo',fill:'#F59E0B',fontSize:11,position:'right'}})
            )
          )
        )
      ),
      /* Horizontal bar — category totals */
      h('div',{style:S.section},
        h('div',{style:S.sectionTitle},'Category Breakdown ('+(isYTD?'YTD':selectedPeriod)+')'),
        h('div',{style:{width:'100%',height:320}},
          h(ResponsiveContainer,{width:'100%',height:'100%'},
            h(BarChart,{data:catBarData,margin:{top:10,right:30,bottom:5,left:10},layout:'vertical'},
              h(CartesianGrid,{strokeDasharray:'3 3',stroke:'#334155'}),
              h(XAxis,{type:'number',stroke:'#64748B',fontSize:11,tickFormatter:function(v){return '$'+Math.round(v/1000)+'K';}}),
              h(YAxis,{type:'category',dataKey:'name',stroke:'#64748B',fontSize:11,width:160}),
              h(Tooltip,{formatter:function(v){return fmtFull(v);},contentStyle:{background:'#1E293B',border:'1px solid #475569',borderRadius:8,color:'#E2E8F0'}}),
              h(Bar,{dataKey:'amount',name:'Actual',radius:[0,4,4,0]},
                catBarData.map(function(d,i){return h(Cell,{key:i,fill:d.color});})
              )
            )
          )
        )
      )
    ),

    /* Category Summary Table */
    h('div',{style:S.section},
      h('div',{style:S.sectionTitle},'Category Summary'),
      h('div',{style:{overflowX:'auto'}},
        h('table',{style:S.table},
          h('thead',null,h('tr',null,
            h('th',{style:S.th},'Category'),
            tableMonths.map(function(m){return h('th',{key:m,style:S.thR},m);}),
            isYTD?h('th',{style:S.thR},'YTD Total'):null
          )),
          h('tbody',null,
            SM_CATEGORIES.map(function(c,i){
              var total=catSum(c);
              return h('tr',{key:i},
                h('td',{style:Object.assign({},S.td,{fontWeight:600})},h('span',{style:{display:'inline-block',width:10,height:10,borderRadius:'50%',background:c.color,marginRight:8}}),c.name),
                tableMonths.map(function(m){var v=catMonth(c,m);return h('td',{key:m,style:S.tdR},v>0?fmtDec(v):'-');}),
                isYTD?h('td',{style:Object.assign({},S.tdR,{fontWeight:700,color:'#F8FAFC'})},fmtDec(total)):null
              );
            }),
            h('tr',{style:{borderTop:'2px solid #475569'}},
              h('td',{style:Object.assign({},S.td,{fontWeight:700})},'Total'),
              tableMonths.map(function(m,i){return h('td',{key:m,style:Object.assign({},S.tdR,{fontWeight:700})},fmtDec(monthTotals[i]));}),
              isYTD?h('td',{style:Object.assign({},S.tdR,{fontWeight:800,color:'#F8FAFC',fontSize:15})},fmtDec(filtered.actual)):null
            )
          )
        )
      )
    ),

    /* Transaction Detail */
    h('div',{style:S.section},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}},
        h('div',{style:S.sectionTitle},'Transaction Detail'+(isYTD?'':' — '+selectedPeriod)),
        h('div',{style:S.filterBar},
          h('span',{style:S.filterLabel},'Filter:'),
          h('button',{style:filterCat==='All'?S.chipActive:S.chip,onClick:function(){setFilterCat('All');}},'All'),
          SM_CATEGORIES.map(function(c){return h('button',{key:c.key,style:filterCat===c.key?S.chipActive:S.chip,onClick:function(){setFilterCat(c.key);}},c.name);})
        )
      ),
      h('div',{style:{overflowX:'auto',maxHeight:500,overflowY:'auto'}},
        h('table',{style:S.table},
          h('thead',{style:{position:'sticky',top:0,background:'#1E293B',zIndex:1}},h('tr',null,
            h('th',{style:S.th},'Date'),h('th',{style:S.th},'Category'),h('th',{style:S.th},'Description'),h('th',{style:S.thR},'Amount')
          )),
          h('tbody',null,
            filteredTxns.map(function(t,i){
              return h('tr',{key:i},
                h('td',{style:S.td},t.date),h('td',{style:S.td},catNameMap[t.cat]||t.cat),h('td',{style:S.td},t.contact),
                h('td',{style:Object.assign({},S.tdR,{fontWeight:500})},fmtDec(t.amount))
              );
            }),
            h('tr',{style:{borderTop:'2px solid #475569'}},
              h('td',{style:S.td}),h('td',{style:Object.assign({},S.td,{fontWeight:700})},'Total ('+filteredTxns.length+' txns)'),h('td',{style:S.td}),
              h('td',{style:Object.assign({},S.tdR,{fontWeight:700,color:'#F8FAFC'})},fmtDec(filteredTxns.reduce(function(s,t){return s+t.amount;},0)))
            )
          )
        )
      )
    )
  );
}

/* ========== MAIN APP ========== */
var TABS = ['OPEX','Rent & Outgoing','Sales & Marketing'];

function App(){
  var state = useState(0);
  var activeTab = state[0];
  var setTab = state[1];

  var overBudget = ytdVariance > 0;
  var statusColor = overBudget ? '#EF4444' : '#10B981';
  var statusLabel = overBudget ? 'OVER BUDGET' : 'ON TRACK';

  var tabContent;
  switch(activeTab){
    case 0: tabContent = h(OpexOverviewTab); break;
    case 1: tabContent = h(RentTab); break;
    case 2: tabContent = h(SalesMarketingTab); break;
    default: tabContent = h(OpexOverviewTab);
  }

  return h('div',{style:{minHeight:'100vh',background:'#0B1120'}},
    /* Header */
    h('div',{style:S.header},
      h('div',{style:{display:'flex',alignItems:'center',gap:16}},
        h('div',{style:{width:10,height:10,borderRadius:'50%',background:overBudget?'#EF4444':'#10B981',boxShadow:'0 0 8px '+(overBudget?'#EF4444':'#10B981')}}),
        h('div',{style:S.headerTitle},'Shafston OPEX 2026 Dashboard')
      ),
      h('div',{style:{display:'flex',alignItems:'center',gap:12}},
        h('div',{style:Object.assign({},S.badge,{background:statusColor+'22',color:statusColor,border:'1px solid '+statusColor})},statusLabel),
        h('div',{style:{fontSize:12,color:'#64748B'}},'Data: '+DATA_DATE)
      )
    ),

    /* Navigation */
    h('div',{style:S.nav},
      TABS.map(function(tab,i){
        return h('button',{key:i,style:activeTab===i?S.navBtnActive:S.navBtn,onClick:function(){setTab(i);}},tab);
      })
    ),

    /* Content */
    h('div',{style:S.content},tabContent),

    /* Footer */
    h('div',{style:S.footer},'Shafston International College | OPEX Dashboard 2026 | Budget: $'+MONTHLY_BUDGET_EX.toFixed(2)+'/mo (ex-GST) | Source: Xero + OPEX Schedule | Updated '+DATA_DATE)
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
